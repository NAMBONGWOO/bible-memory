<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성경암송 매니저 Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-screen" class="modal-overlay">
        
        <div class="auth-card" id="login-card" style="display: block;">
            <h2 style="color:var(--dark-blue);">성경암송 매니저</h2>
            <p style="font-size:14px; color:#666; margin-bottom:20px;">로그인 후 암송을 시작하세요.</p>
            <input type="email" id="login-email" class="test-input" placeholder="이메일 주소">
            <input type="password" id="login-pw" class="test-input" placeholder="비밀번호">
            <button class="btn primary-btn" style="width:100%; margin-top:10px;" onclick="handleLogin()">로그인</button>
            <p style="margin-top:20px; font-size:13px; color:#888;">
                계정이 없으신가요? <a href="#" onclick="openSignupModal()" style="color:var(--main-blue); font-weight:bold; text-decoration:none;">회원가입 하기</a>
            </p>
        </div>

        <div class="auth-card" id="signup-card" style="display: none; color:#333;">
            <h3 style="color:var(--main-blue); margin-bottom:10px;">새 계정 만들기</h3>
            
            <div style="text-align:left; font-size:12px;">
                <label style="font-weight:bold; display:block; margin-bottom:5px;">이메일 아이디</label>
                <input type="email" id="reg-email" class="test-input" placeholder="example@mail.com">
                
                <label style="font-weight:bold; display:block; margin-bottom:5px;">비밀번호 (6자 이상)</label>
                <div class="pw-group">
                    <input type="password" id="reg-pw" class="test-input" placeholder="비밀번호 입력">
                    <span class="pw-toggle" onclick="togglePw('reg-pw')">👁️</span>
                </div>
                
                <label style="font-weight:bold; display:block; margin-bottom:5px;">비밀번호 확인</label>
                <div class="pw-group">
                    <input type="password" id="reg-pw-confirm" class="test-input" placeholder="다시 한번 입력">
                    <span class="pw-toggle" onclick="togglePw('reg-pw-confirm')">👁️</span>
                </div>
                
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
                    <label style="font-weight:bold;">닉네임 (활동명)</label>
                    <span id="nick-check-msg" class="check-msg"></span>
                </div>
                <input type="text" id="reg-nickname" class="test-input" placeholder="암송왕" oninput="checkNickname(this.value)">

                <label style="display:block; margin:10px 0 8px; font-weight:bold;">암송 코스 선택 (중복 가능)</label>
                <div id="course-checkboxes">
                    <div><input type="checkbox" name="course" value="BB01" id="c1" checked> <label for="c1">주제별 60구절 (개역한글)</label></div>
                    <div><input type="checkbox" name="course" value="BA01" id="c2"> <label for="c2">기초 과정 (새출발/동행)</label></div>
                    <div><input type="checkbox" name="course" value="BC01" id="c3"> <label for="c3">심화 180구절 세트</label></div>
                    <div><input type="checkbox" name="course" value="BF10" id="c4"> <label for="c4">DEP 242구절 세트</label></div>
                    <div><input type="checkbox" name="course" value="BD03" id="c5"> <label for="c5">어린이 암송카드</label></div>
                    <div style="color:var(--main-blue); font-weight:bold;"><input type="checkbox" checked disabled> OYO (나만의 카드 포함)</div>
                </div>
            </div>

            <div style="display:flex; gap:10px; margin-top:10px; padding-bottom:10px;">
                <button class="btn" style="background:#eee; flex:1; color:#333;" onclick="closeSignupModal()">취소</button>
                <button class="btn primary-btn" style="flex:2;" onclick="handleSignUpFinal()">가입 완료</button>
            </div>
        </div>
    </div>

    <div id="app-content" style="display: none; flex-direction: column; align-items: center; width: 100%;">
        <div class="top-bar">
            <div class="header-title" id="user-display">반갑습니다!</div>
            <button onclick="handleLogout()" style="background:none; border:none; color:white; font-size:12px;">로그아웃</button>
        </div>
        <div id="part-container" class="part-menu" style="margin-top:80px;"></div>
        <div class="card" id="main-card" onclick="handleCardClick()">
            <div id="v-id" class="id-tag">-</div>
            <div id="v-theme" class="theme">제목</div>
            <div id="v-ref" class="ref">장절</div>
            <div id="v-content" class="content">내용</div>
        </div>
        <div class="controls">
            <button class="btn" onclick="prevVerse()">이전</button>
            <button class="btn" onclick="handleNext()">다음</button>
        </div>
        <div id="v-page" class="footer">0 / 0</div>
    </div>

    <script type="module" src="app.js"></script>
    <script src="test.js"></script>
</body>
</html>
