<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성경암송 매니저</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-screen" class="auth-overlay">
        </div>

    <div id="app-content" style="display:none; width:100%">
        <header class="top-bar">
            <button class="menu-btn" onclick="toggleMenu()" style="background:none; border:none; color:white; font-size:30px; cursor:pointer; padding:5px;">≡</button>
            <div id="mode-title" style="font-weight:bold; font-size:18px;">암송 카드 (연습)</div>
            <button onclick="handleLogout()" style="background:rgba(255,255,255,0.2); border:none; color:white; padding:6px 12px; border-radius:8px; font-size:12px;">로그아웃</button>
        </header>

        <div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>
        
        <div class="side-menu" id="sideMenu">
            <div style="font-size:22px; font-weight:bold; color:var(--dark-blue); margin-bottom:25px;" id="user-display">사용자님</div>
            <nav style="flex:1;">
                <div class="menu-item" onclick="setMode('practice'); toggleMenu();">📖 암송 연습</div>
                <div class="menu-item" onclick="setMode('test'); toggleMenu();">✍️ 암송 테스트</div>
                <div style="margin-top:40px; font-size:11px; color:#94a3b8; font-weight:bold; letter-spacing:1px; margin-bottom:10px;">데이터 세트 선택</div>
                <select id="data-select" class="test-input" onchange="loadData(this.value); toggleMenu();" style="width:100%; height:45px; border-radius:10px; border:1px solid #ddd; padding:0 10px;"></select>
            </nav>
        </div>

        <main class="main-content">
            <div id="part-container"></div> <div class="card" id="main-card" onclick="handleCardClick()">
                <div id="v-id" style="color:var(--main-blue); font-weight:bold; font-size:13px; margin-bottom:12px;">-</div>
                <div id="v-theme" style="font-size:22px; font-weight:bold; margin-bottom:15px;">제목</div>
                <div id="v-ref" style="font-size:16px; color:#64748b; margin-bottom:20px;">장절</div>
                <div id="v-content" style="font-size:19px; line-height:1.7; word-break:keep-all;">내용</div>
            </div>

            <div class="controls" style="display:flex; gap:15px; width:90%; max-width:400px;">
                <button class="btn" style="background:white; color:#475569; flex:1; border:1px solid #ddd;" onclick="prevVerse()">이전</button>
                <button class="btn primary-btn" style="flex:1.5;" onclick="handleNext()">다음</button>
            </div>
            <div id="v-page" style="margin-top:25px; color:rgba(255,255,255,0.7); font-size:14px;">0 / 0</div>
        </main>
    </div>

    <script type="module" src="auth.js"></script>
    <script type="module" src="app.js"></script>
    <script src="practice.js"></script>
    <script src="test.js"></script>
</body>
</html>
