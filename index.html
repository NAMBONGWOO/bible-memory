<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성경암송 매니저 Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-screen" class="modal-overlay" style="display: flex;">
        <div class="auth-card" id="auth-step-1">
            <h2 style="color:var(--dark-blue);">성경암송 매니저</h2>
            <p style="font-size:14px; color:#666; margin-bottom:20px;">암송의 여정을 시작하세요.</p>
            <input type="email" id="auth-email" class="test-input" placeholder="이메일 주소" style="color:#000;">
            <input type="password" id="auth-pw" class="test-input" placeholder="비밀번호 (6자 이상)" style="color:#000;">
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button class="btn" style="background:#eee; flex:1; color:#333;" onclick="handleLogin()">로그인</button>
                <button class="btn primary-btn" style="flex:1;" onclick="openRegisterPopup()">회원가입</button>
            </div>
            <p id="auth-error" style="color:var(--error-red); font-size:12px; margin-top:10px;"></p>
        </div>

        <div class="auth-card" id="auth-step-2" style="display:none; color: #333;">
            <h3 style="color:var(--main-blue); margin-bottom: 10px;">회원정보 설정</h3>
            <p style="font-size:13px; color:#666; margin-bottom: 15px;">암송하고 싶은 코스를 선택해주세요.</p>
            
            <input type="text" id="reg-nickname" class="test-input" placeholder="닉네임 (활동명)" style="color: #000; border: 1px solid #ccc;">
            
            <label style="display:block; text-align:left; font-size:12px; margin: 15px 0 5px 5px; font-weight:bold; color: #333;">암송 코스 선택 (중복 가능):</label>
            
            <div id="course-checkboxes" style="text-align:left; background:#fff; padding:12px; border-radius:8px; max-height:180px; overflow-y:auto; font-size:14px; border:1px solid #ccc; color: #333;">
                <div style="margin-bottom:10px; display: flex; align-items: center;">
                    <input type="checkbox" name="course" value="BB01" id="c1" checked style="margin-right:8px; width:18px; height:18px;"> 
                    <label for="c1" style="cursor:pointer; flex:1;">주제별 60구절 (개역한글)</label>
                </div>
                <div style="margin-bottom:10px; display: flex; align-items: center;">
                    <input type="checkbox" name="course" value="BA01" id="c2" style="margin-right:8px; width:18px; height:18px;"> 
                    <label for="c2" style="cursor:pointer; flex:1;">기초 과정 (새출발/동행)</label>
                </div>
                <div style="margin-bottom:10px; display: flex; align-items: center;">
                    <input type="checkbox" name="course" value="BC01" id="c3" style="margin-right:8px; width:18px; height:18px;"> 
                    <label for="c3" style="cursor:pointer; flex:1;">심화 180구절 세트</label>
                </div>
                <div style="margin-bottom:10px; display: flex; align-items: center;">
                    <input type="checkbox" name="course" value="BF10" id="c4" style="margin-right:8px; width:18px; height:18px;"> 
                    <label for="c4" style="cursor:pointer; flex:1;">DEP 242구절 세트</label>
                </div>
                <div style="margin-bottom:10px; display: flex; align-items: center;">
                    <input type="checkbox" name="course" value="BD03" id="c5" style="margin-right:8px; width:18px; height:18px;"> 
                    <label for="c5" style="cursor:pointer; flex:1;">어린이 암송카드</label>
                </div>
                <hr style="border:0; border-top:1px solid #eee; margin:10px 0;">
                <div style="display: flex; align-items: center; color:var(--main-blue); font-weight:bold;">
                    <input type="checkbox" id="reg-oyo" checked disabled style="margin-right:8px; width:18px; height:18px;"> 
                    <label style="flex:1;">OYO (나만의 카드 - 기본제공)</label>
                </div>
            </div>

            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn" style="background:#eee; color:#333; flex:1;" onclick="closeRegisterPopup()">이전으로</button>
                <button class="btn primary-btn" style="flex:1;" onclick="handleSignUpFinal()">가입 완료 및 시작</button>
            </div>
        </div>
    </div>

    <div id="app-content" style="display: none; flex-direction: column; align-items: center; width: 100%;">
        <div class="top-bar">
            <div class="header-title" id="mode-title">암송 카드 (연습)</div>
            <button onclick="handleLogout()" style="background:none; border:none; color:white; font-size:12px;">로그아웃</button>
        </div>
        <div id="user-display" style="margin-top:20px; font-weight:bold; color:var(--dark-blue); font-size:18px;"></div>
        <div id="part-container" class="part-menu"></div>
        <div class="card" id="main-card" onclick="handleCardClick()">
            <div id="v-id" class="id-tag">-</div>
            <div id="v-theme" class="theme">제목</div>
            <div id="v-ref" class="ref">장절</div>
            <div id="v-content" class="content">내용</div>
        </div>
        <div class="controls">
            <button class="btn" onclick="prevVerse()">이전</button>
            <button class="btn" onclick="handleNext()">다음</button>
        </div>
        <div id="v-page" class="footer">0 / 0</div>
    </div>

    <script type="module" src="app.js"></script>
    <script src="test.js"></script>
</body>
</html>
