<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성경암송 매니저 Pro</title>
    <style>
        :root { 
            --main-blue: #0ea5e9; --dark-blue: #075985; --card-bg: #ffffff;
            --text-main: #1e293b; --error-red: #f43f5e; --success-green: #10b981;
        }
        
        body { 
            background: radial-gradient(circle at top, var(--main-blue) 0%, var(--dark-blue) 100%);
            background-attachment: fixed; font-family: sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            margin: 0; padding: 0; min-height: 100vh; color: white; overflow-x: hidden;
        }

        .top-bar { 
            width: 100%; height: 65px; display: flex; align-items: center; padding: 0 15px; 
            box-sizing: border-box; position: sticky; top: 0; z-index: 100;
            background: rgba(7, 89, 133, 0.8); backdrop-filter: blur(10px);
        }
        .menu-btn { font-size: 30px; cursor: pointer; background: none; border: none; color: white; padding: 5px 10px; }
        .header-title { flex-grow: 1; text-align: center; font-size: 18px; font-weight: 700; margin-right: 50px; }

        /* 사이드바 */
        .side-menu { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #ffffff; color: #333; transition: 0.4s; z-index: 1000; box-shadow: 10px 0 30px rgba(0,0,0,0.4); }
        .side-menu.open { left: 0; }
        .menu-header { padding: 30px 20px; font-weight: 800; font-size: 20px; border-bottom: 2px solid var(--main-blue); color: var(--main-blue); background: #f8fafc; }
        .menu-item { padding: 16px 25px; font-size: 16px; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 999; }
        .set-select { width: 85%; margin: 10px 20px; padding: 12px; border-radius: 10px; border: 2px solid #e2e8f0; }

        /* 파트 버튼 (연습모드에서만 보임) */
        #part-container { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 20px 0; padding: 0 15px; width: 100%; max-width: 420px; }
        .part-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 10px; border-radius: 12px; cursor: pointer; font-size: 12px; flex: 1 1 calc(33% - 10px); }
        .part-btn.active { background: white; color: var(--dark-blue); font-weight: 800; }
        
        /* 카드 디자인 */
        .card { 
            background: var(--card-bg); width: calc(100% - 30px); max-width: 380px; border-radius: 25px; padding: 30px; 
            text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); min-height: 200px; 
            display: flex; flex-direction: column; justify-content: center; position: relative; color: var(--text-main); box-sizing: border-box;
        }
        .score-display { font-size: 32px; font-weight: 900; color: var(--error-red); margin-bottom: 10px; display: none; }
        .id-tag { color: var(--main-blue); font-weight: 800; font-size: 14px; margin-bottom: 8px; }
        .theme { color: var(--dark-blue); font-size: 24px; font-weight: 800; margin: 5px 0; }
        .ref { color: #64748b; font-size: 20px; margin-bottom: 15px; }
        .content { color: #0f172a; font-size: 19px; line-height: 1.7; display: none; text-align: left; background: #f8fafc; padding: 20px; border-radius: 15px; word-break: keep-all; }
        .result-view { text-align: left; font-size: 18px; line-height: 1.7; margin-top: 15px; display: none; background: #fff1f2; padding: 15px; border-radius: 12px; color: #333; }
        .wrong { color: var(--error-red); text-decoration: underline; font-weight: bold; }
        
        /* 테스트 입력창 */
        #test-section { width: calc(100% - 30px); max-width: 380px; margin-top: 20px; display: none; }
        .input-label { font-size: 14px; font-weight: bold; margin-bottom: 8px; display: block; opacity: 0.9; }
        .test-input { width: 100%; border-radius: 12px; border: none; padding: 15px; font-size: 16px; box-sizing: border-box; outline: none; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        textarea.test-input { height: 120px; }
        
        .controls { display: flex; gap: 12px; margin: 25px 0; width: calc(100% - 30px); max-width: 380px; }
        .btn { flex: 1; background: white; border: none; color: var(--dark-blue); padding: 16px; border-radius: 15px; font-weight: 800; cursor: pointer; font-size: 16px; box-shadow: 0 8px 15px rgba(0,0,0,0.2); }
        .check-btn { background: #fbbf24; color: #78350f; width: calc(100% - 30px); max-width: 380px; margin-top: 10px; font-weight: bold; }

        .footer { margin-bottom: 50px; font-size: 14px; opacity: 0.8; background: rgba(0,0,0,0.2); padding: 6px 18px; border-radius: 20px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="menu-btn" onclick="toggleMenu()">≡</button>
        <div class="header-title" id="mode-title">암송 카드 (연습)</div>
    </div>

    <div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="side-menu" id="sideMenu">
        <div class="menu-header">암송 매니저</div>
        <div class="menu-item" onclick="setMode('practice')">📖 암송 카드 (연습)</div>
        <div class="menu-item" onclick="setMode('test')">✍️ 암송 테스트 (시험)</div>
        <div style="padding: 20px 20px 5px; font-size: 12px; color: #999;">데이터 세트</div>
        <select class="set-select" id="data-select" onchange="loadData(this.value); toggleMenu();"></select>
    </div>

    <div id="part-container"></div>

    <div class="card" id="main-card" onclick="handleCardClick()">
        <div id="score-text" class="score-display">0</div>
        <div id="v-id" class="id-tag">-</div>
        <div id="v-theme" class="theme">주제</div>
        <div id="v-ref" class="ref">장절</div>
        <div id="v-content" class="content">내용</div>
        <div id="result-view" class="result-view"></div>
    </div>

    <div id="test-section">
        <span class="input-label">주제 입력</span>
        <input type="text" id="input-theme" class="test-input" placeholder="주제를 입력하세요">
        <span class="input-label">내용 입력</span>
        <textarea id="input-content" class="test-input" placeholder="본문 내용을 입력하세요"></textarea>
    </div>

    <button id="check-btn" class="btn check-btn" onclick="runCheck()" style="display:none;">채점하기 (체킹)</button>

    <div class="controls">
        <button class="btn" onclick="prevVerse()" id="prev-btn">이전</button>
        <button class="btn" onclick="nextVerse()" id="next-btn">다음</button>
    </div>

    <div id="v-page" class="footer">0 / 0</div>

    <script>
        let allVerses = [];
        let currentVerses = [];
        let currentIndex = 0;
        let isShowing = false;
        let currentMode = 'practice';

        async function initApp() {
            try {
                const response = await fetch('data/config.json');
                const config = await response.json();
                const selectEl = document.getElementById('data-select');
                config.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.file; option.innerText = item.name;
                    selectEl.appendChild(option);
                });
                loadData(config[0].file);
            } catch (e) { loadData('nav_60.json'); }
        }

        function toggleMenu() {
            const sideMenu = document.getElementById('sideMenu');
            const overlay = document.getElementById('overlay');
            sideMenu.classList.toggle('open');
            overlay.style.display = sideMenu.classList.contains('open') ? 'block' : 'none';
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('mode-title').innerText = mode === 'practice' ? '암송 카드 (연습)' : '암송 테스트 (시험)';
            document.getElementById('test-section').style.display = mode === 'test' ? 'block' : 'none';
            document.getElementById('check-btn').style.display = mode === 'test' ? 'block' : 'none';
            document.getElementById('part-container').style.display = mode === 'test' ? 'none' : 'flex';
            
            // 테스트 모드일 때 버튼 텍스트 변경
            document.getElementById('next-btn').innerText = mode === 'test' ? '랜덤 출제' : '다음';
            document.getElementById('prev-btn').style.visibility = mode === 'test' ? 'hidden' : 'visible';

            toggleMenu();
            
            if(mode === 'test') {
                goRandom();
            } else {
                filterPart('A');
            }
        }

        async function loadData(fileName) {
            const response = await fetch('data/' + fileName);
            allVerses = await response.json();
            generatePartButtons();
            if(currentMode === 'practice') filterPart('A');
            else goRandom();
        }

        function generatePartButtons() {
            const container = document.getElementById('part-container');
            const parts = [...new Set(allVerses.map(v => v.p))];
            container.innerHTML = '';
            parts.forEach(p => {
                const btn = document.createElement('button');
                btn.className = 'part-btn';
                btn.innerText = p + "파트";
                btn.onclick = () => filterPart(p);
                container.appendChild(btn);
            });
        }

        function filterPart(part) {
            currentVerses = allVerses.filter(v => v.p === part);
            currentIndex = 0;
            updateCard();
            document.querySelectorAll('.part-btn').forEach(btn => btn.classList.toggle('active', btn.innerText.includes(part)));
        }

        function goRandom() {
            currentIndex = Math.floor(Math.random() * allVerses.length);
            currentVerses = allVerses;
            updateCard();
        }

        function updateCard() {
            const v = currentVerses[currentIndex];
            if(!v) return;
            document.getElementById('v-id').innerText = v.id;
            document.getElementById('v-theme').innerText = v.theme;
            document.getElementById('v-ref').innerText = v.ref;
            document.getElementById('v-content').innerText = v.content;
            
            isShowing = false;
            document.getElementById('v-content').style.display = 'none';
            document.getElementById('result-view').style.display = 'none';
            document.getElementById('score-text').style.display = 'none';
            document.getElementById('input-theme').value = "";
            document.getElementById('input-content').value = "";
            
            if(currentMode === 'practice') {
                document.getElementById('v-page').innerText = (currentIndex + 1) + " / " + currentVerses.length;
            } else {
                document.getElementById('v-page').innerText = "랜덤 테스트 중";
            }
        }

        function handleCardClick() {
            if(currentMode === 'practice') {
                const content = document.getElementById('v-content');
                isShowing = !isShowing;
                content.style.display = isShowing ? 'block' : 'none';
            }
        }

        function runCheck() {
            const v = currentVerses[currentIndex];
            const themeInput = document.getElementById('input-theme').value.trim();
            const contentInput = document.getElementById('input-content').value.trim();
            
            const clean = (text) => text.replace(/[.,·?!"'()]/g, "").replace(/\s/g, "");
            const originalWords = v.content.split(/\s+/);
            const inputWords = contentInput.split(/\s+/);

            let penalty = 0;
            let resultHTML = "";

            // 주제 채점
            if(clean(themeInput) !== clean(v.theme)) {
                penalty += 1;
            }

            // 본문 채점
            const maxLength = Math.max(originalWords.length, inputWords.length);
            for(let i = 0; i < maxLength; i++) {
                const target = originalWords[i] || "";
                const input = inputWords[i] || "";

                if (target !== "" && clean(target) === clean(input)) {
                    resultHTML += target + " ";
                } else {
                    penalty += 1;
                    resultHTML += `<span class="wrong">${input || "___"}</span> `;
                }
            }

            // 점수 계산 (0점에서 시작하여 -5까지)
            const finalScore = Math.max(-penalty, -5);
            const scoreEl = document.getElementById('score-text');
            scoreEl.innerText = (finalScore === 0 ? "0" : finalScore);
            scoreEl.style.display = 'block';
            
            const resultEl = document.getElementById('result-view');
            resultEl.innerHTML = `<strong>채점 결과 (틀린 소절):</strong><br>${resultHTML}<br><br><strong>원문 보기:</strong><br>${v.content}`;
            resultEl.style.display = 'block';
        }

        function nextVerse() {
            if(currentMode === 'test') goRandom();
            else if (currentIndex < currentVerses.length - 1) { currentIndex++; updateCard(); }
        }

        function prevVerse() {
            if(currentMode === 'practice' && currentIndex > 0) { currentIndex--; updateCard(); }
        }

        initApp();
    </script>
</body>
</html>
