<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성경암송 Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-screen" class="auth-overlay">
        <div id="login-card" class="auth-card">
            <h2 style="color:var(--main-blue); margin-top:0;">성경암송 매니저</h2>
            <p style="font-size:14px; color:#666; margin-bottom:20px;">암송의 여정을 시작하세요.</p>
            <input type="email" id="login-email" class="test-input" placeholder="이메일 주소">
            <input type="password" id="login-pw" class="test-input" placeholder="비밀번호">
            <button class="btn primary-btn" onclick="handleLogin()">로그인</button>
            <p style="font-size:13px; margin-top:15px;">계정이 없으신가요? <a href="#" onclick="openSignupModal()" style="color:var(--main-blue); font-weight:bold; text-decoration:none;">회원가입 하기</a></p>
        </div>

<div id="signup-card" class="auth-card" style="display:none; max-height: 90vh; overflow-y: auto;">
    <h3 style="color:var(--main-blue); margin-bottom: 20px;">새 계정 만들기</h3>
    
    <div style="text-align:left;">
        <label style="font-size:12px; font-weight:bold; display:block; margin-bottom:5px;">이메일</label>
        <input type="email" id="reg-email" class="test-input" placeholder="example@mail.com">
        
        <label style="font-size:12px; font-weight:bold; display:block; margin-bottom:5px;">비밀번호 (6자 이상)</label>
        <input type="password" id="reg-pw" class="test-input" placeholder="비밀번호 입력">
        <input type="password" id="reg-pw-confirm" class="test-input" placeholder="비밀번호 확인">
        <div id="pw-match-msg" class="check-msg" style="margin-bottom:10px;"></div>

        <label style="font-size:12px; font-weight:bold; display:block; margin-bottom:5px;">닉네임</label>
        <input type="text" id="reg-nickname" class="test-input" placeholder="암송왕">
        <div id="nick-match-msg" class="check-msg" style="margin-bottom:10px;"></div>
        
        <label style="font-weight:bold; font-size:13px; display:block; margin-bottom:10px;">암송 코스 선택</label>
        <div id="course-checkboxes">
            <p style="margin:0 0 5px; font-weight:bold; color:var(--dark-blue);">[기본]</p>
            <label><input type="checkbox" name="course" value="nav_60.json" checked> 주제별 60</label><br>
            <label><input type="checkbox" name="course" value="nav_60_en.json"> 주제별 60 (EN)</label>
            
            <p style="margin:10px 0 5px; font-weight:bold; color:var(--dark-blue);">[시리즈 180]</p>
            <label><input type="checkbox" name="course" value="series_180_s1.json"> 시리즈 1</label><br>
            <p style="margin:10px 0 5px; font-weight:bold; color:var(--dark-blue);">[DEP 242]</p>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                <label><input type="checkbox" name="course" value="dep_242_p1.json"> DEP 1</label>
                <label><input type="checkbox" name="course" value="dep_242_p2.json"> DEP 2</label>
                </div>
        </div>
    </div>
    
    <button class="btn primary-btn" style="margin-top:10px;" onclick="handleSignUpFinal()">가입 완료</button>
    <button class="btn" style="background:#eee; color:#333; margin-top:10px;" onclick="closeSignupModal()">취소</button>
</div>
    </div>

    <div id="app-content" style="display:none; width:100%">
        <header class="top-bar">
            <button onclick="toggleMenu()" style="background:none; border:none; color:white; font-size:30px; cursor:pointer;">≡</button>
            <div id="mode-title" style="font-weight:bold;">암송 카드 (연습)</div>
            <button onclick="handleLogout()" style="background:none; border:none; color:white; font-size:12px; cursor:pointer;">로그아웃</button>
        </header>

        <div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>
        <div class="side-menu" id="sideMenu">
            <div id="user-display" style="font-weight:bold; font-size:22px; color:var(--dark-blue); margin-bottom:25px;">사용자님</div>
            <div class="menu-item" style="padding:15px 0; border-bottom:1px solid #eee; cursor:pointer;" onclick="setMode('practice')">📖 암송 연습</div>
            <div class="menu-item" style="padding:15px 0; border-bottom:1px solid #eee; cursor:pointer;" onclick="setMode('test')">✍️ 암송 테스트</div>
            
            <div style="margin-top:30px; font-size:11px; color:#999; font-weight:bold;">데이터 세트 선택</div>
            <select id="data-select" class="test-input" onchange="loadData(this.value); toggleMenu();" style="margin-top:5px; height:40px;"></select>
        </div>

        <main class="main-content">
            <div id="part-container" style="display:flex; flex-wrap:wrap; justify-content:center; gap:8px; margin-bottom:20px; width:90%;"></div>

            <div id="status-panel" style="display:none; width:90%; max-width:450px; justify-content:space-between; margin-bottom:10px; color:white; font-size:14px; font-weight:bold;">
                <span id="test-progress">진행: 1 / 10</span>
                <span id="test-total-score">누적 감점: 0</span>
            </div>

            <div class="card" id="main-card">
                <div id="v-ref" style="font-size:18px; font-weight:bold; color:var(--main-blue); margin-bottom:15px;">장절 정보</div>

                <div id="test-setup" style="display:none;">
                    <p style="color:#333;">테스트할 구절 수를 입력하세요.</p>
                    <input type="number" id="test-count-input" class="test-input" value="10" style="text-align:center; width:80px; margin-bottom:15px;">
                    <button class="btn primary-btn" onclick="startTestSession()">테스트 시작</button>
                </div>

                <div id="test-section" style="display:none; width:100%;">
                    <input type="text" id="test-theme-input" class="test-input" placeholder="제목을 입력하세요">
                    <textarea id="test-content-input" class="test-input" style="height:120px; padding:15px;" placeholder="본문 내용을 입력하세요"></textarea>
                    <button id="check-btn" class="btn primary-btn" onclick="runCheck()">채점하기</button>
                    <div id="test-result-view" style="display:none; font-size:14px; line-height:1.6; margin-top:15px; text-align:left;"></div>
                </div>

                <div id="practice-area" onclick="handleCardClick()" style="cursor:pointer; width:100%;">
                    <div id="v-id" style="font-size:12px; color:#94a3b8; margin-bottom:5px;">ID</div>
                    <div id="v-theme" style="font-size:22px; font-weight:bold; margin-bottom:10px; color:#333;">주제</div>
                    <div id="v-content" style="font-size:19px; line-height:1.6; display:none; word-break:keep-all; color:#444;">내용</div>
                </div>
            </div>

            <div class="controls" style="width:90%; max-width:450px;">
                <div id="practice-controls" style="display:flex; gap:12px;">
                    <button class="btn" style="background:white; color:#333; flex:1; border:1px solid #ddd;" onclick="prevVerse()">이전</button>
                    <button class="btn primary-btn" style="flex:1.5;" onclick="handleNext()">다음</button>
                </div>
                <div id="test-controls" style="display:none;">
                    <button class="btn primary-btn" onclick="testNext()">다음 문제로</button>
                </div>
            </div>
            <div id="v-page" style="margin-top:20px; color:rgba(255,255,255,0.7); font-size:14px;">0 / 0</div>
        </main>
    </div>

    <script type="module" src="auth.js"></script>
    <script type="module" src="app.js"></script>
    <script src="practice.js"></script>
    <script src="test.js"></script>
</body>
</html>
