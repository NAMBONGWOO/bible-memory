<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성경암송 Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-screen" class="auth-overlay">
        <div id="login-card" class="auth-card">
            <h2 style="color:var(--main-blue);">성경암송 Pro</h2>
            <input type="email" id="login-email" class="test-input" placeholder="이메일">
            <input type="password" id="login-pw" class="test-input" placeholder="비밀번호">
            <button class="btn primary-btn" onclick="handleLogin()">로그인</button>
            <p style="font-size:13px; color:#666;">계정이 없으신가요? <a href="#" onclick="openSignupModal()" style="color:var(--main-blue); font-weight:bold;">회원가입</a></p>
        </div>

        <div id="signup-card" class="auth-card" style="display:none; max-height: 85vh; overflow-y: auto;">
            <h3 style="color:var(--main-blue);">새 계정 만들기</h3>
            <div style="text-align:left; display:flex; flex-direction:column; gap:8px;">
                <input type="email" id="reg-email" class="test-input" placeholder="이메일">
                <input type="password" id="reg-pw" class="test-input" placeholder="비밀번호">
                <input type="password" id="reg-pw-confirm" class="test-input" placeholder="비밀번호 확인">
                <div id="pw-match-msg" style="font-size:11px; min-height:15px;"></div>
                <input type="text" id="reg-nickname" class="test-input" placeholder="닉네임 (2자 이상)">
                <div id="nick-match-msg" style="font-size:11px; min-height:15px;"></div>
                
                <div id="course-checkboxes" style="background:#f8fafc; padding:15px; border-radius:15px; font-size:11px; color:#333;">
                    <p style="margin:0 0 8px; font-weight:bold; color:var(--dark-blue);">[전체 코스 선택]</p>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px;">
                        <label><input type="checkbox" name="course" value="nav_60.json" checked> 주제별 60</label>
                        <label><input type="checkbox" name="course" value="nav_60_en.json"> 60 (EN)</label>
                        <label><input type="checkbox" name="course" value="series_180_s1.json"> 시리즈 1</label>
                        <label><input type="checkbox" name="course" value="series_180_s2.json"> 시리즈 2</label>
                        <label><input type="checkbox" name="course" value="series_180_s3.json"> 시리즈 3</label>
                        <label><input type="checkbox" name="course" value="series_180_s4.json"> 시리즈 4</label>
                        <label><input type="checkbox" name="course" value="series_180_s5.json"> 시리즈 5</label>
                        <label><input type="checkbox" name="course" value="dep_242_p1.json"> DEP 1</label>
                        <label><input type="checkbox" name="course" value="dep_242_p2.json"> DEP 2</label>
                        <label><input type="checkbox" name="course" value="dep_242_p3.json"> DEP 3</label>
                        <label><input type="checkbox" name="course" value="dep_242_p4.json"> DEP 4</label>
                        <label><input type="checkbox" name="course" value="dep_242_p5.json"> DEP 5</label>
                        <label><input type="checkbox" name="course" value="dep_242_p6.json"> DEP 6</label>
                        <label><input type="checkbox" name="course" value="dep_242_p7.json"> DEP 7</label>
                        <label><input type="checkbox" name="course" value="dep_242_p8.json"> DEP 8</label>
                    </div>
                </div>
            </div>
            <button class="btn primary-btn" style="margin-top:10px;" onclick="handleSignUpFinal()">가입 완료</button>
            <button class="btn" style="background:#eee; color:#333; width:100%; margin-top:5px;" onclick="closeSignupModal()">취소</button>
        </div>
    </div>

    <div id="app-content" style="display:none; width:100%">
        <header class="top-bar">
            <button onclick="toggleMenu()" style="background:none; border:none; color:white; font-size:30px; cursor:pointer;">≡</button>
            <div id="mode-title" style="font-weight:bold;">암송 카드 (연습)</div>
            <button onclick="handleLogout()" style="background:none; border:none; color:white; font-size:12px;">로그아웃</button>
        </header>

        <div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>
        <div class="side-menu" id="sideMenu">
            <div id="user-display" style="font-weight:bold; font-size:22px; color:var(--dark-blue); margin-bottom:25px;">사용자님</div>
            <div class="menu-item" onclick="setMode('practice'); toggleMenu();">📖 암송 연습</div>
            <div class="menu-item" onclick="setMode('test'); toggleMenu();">✍️ 암송 테스트</div>
            <div style="margin-top:30px; font-size:11px; color:#999; font-weight:bold;">데이터 세트 선택</div>
            <select id="data-select" class="test-input" onchange="loadData(this.value); toggleMenu();" style="margin-top:5px;"></select>
            <div style="flex:1;"></div>
            <div class="menu-item" onclick="alert('준비 중인 기능입니다.'); toggleMenu();" style="border:none; color:#666; font-size:14px; padding-bottom:0;">⚙️ 설정 및 관리</div>
        </div>

        <main class="main-content">
            <div id="part-container" style="display:flex; flex-wrap:wrap; justify-content:center; gap:8px; margin-bottom:20px; width:90%;"></div>
            <div class="card" id="main-card" onclick="handleCardClick()">
                <div id="v-id" style="color:var(--main-blue); font-weight:bold; font-size:13px; margin-bottom:10px;">-</div>
                <div id="v-theme" style="font-size:22px; font-weight:bold; margin-bottom:15px;">제목</div>
                <div id="v-ref" style="font-size:17px; color:#64748b; margin-bottom:20px;">장절</div>
                <div id="v-content" style="font-size:19px; line-height:1.7; word-break:keep-all;">내용</div>
            </div>
            <div class="controls" style="display:flex; gap:12px; width:90%; max-width:450px;">
                <button class="btn" style="background:white; color:#333; flex:1; border:1px solid #ddd;" onclick="prevVerse()">이전</button>
                <button class="btn primary-btn" style="flex:1.5;" onclick="handleNext()">다음</button>
            </div>
            <div id="v-page" style="margin-top:20px; color:rgba(255,255,255,0.7); font-size:14px;">0 / 0</div>
        </main>
    </div>

    <script type="module" src="auth.js"></script>
    <script type="module" src="app.js"></script>
    <script src="practice.js"></script>
    <script src="test.js"></script>
</body>
</html>
