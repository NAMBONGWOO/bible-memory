<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성경암송 매니저 Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-screen" class="auth-overlay">
        <div id="login-card" class="auth-card">
            <h2 style="color:var(--main-blue)">성경암송 매니저</h2>
            <input type="email" id="login-email" class="btn" style="background:#f1f5f9; text-align:left" placeholder="이메일">
            <input type="password" id="login-pw" class="btn" style="background:#f1f5f9; text-align:left" placeholder="비밀번호">
            <button class="btn primary-btn" onclick="handleLogin()">로그인</button>
            <p style="font-size:13px; margin-top:15px;">계정이 없으신가요? <a href="#" onclick="openSignupModal()">회원가입</a></p>
        </div>
        <div id="signup-card" class="auth-card" style="display:none">
            <h3>회원가입</h3>
            <input type="email" id="reg-email" class="btn" style="background:#f1f5f9" placeholder="이메일 주소">
            <input type="password" id="reg-pw" class="btn" style="background:#f1f5f9" placeholder="비밀번호">
            <input type="text" id="reg-nickname" class="btn" style="background:#f1f5f9" placeholder="닉네임">
            <div id="course-checkboxes" style="text-align:left; font-size:13px; background:#f8fafc; padding:10px; border-radius:10px; margin-top:10px;">
                <label style="font-weight:bold; margin-bottom:5px; display:block">코스 선택</label>
                <div><input type="checkbox" name="course" value="nav_60.json" checked> 주제별 60구절</div>
                <div><input type="checkbox" name="course" value="basic_100.json"> 기초 과정</div>
                <div><input type="checkbox" name="course" value="deep_180.json"> 심화 180구절</div>
            </div>
            <button class="btn primary-btn" onclick="handleSignUpFinal()">가입 완료</button>
            <button class="btn" style="background:#eee" onclick="closeSignupModal()">취소</button>
        </div>
    </div>

    <div id="app-content" style="display:none">
        <div class="top-bar">
            <button class="menu-btn" onclick="toggleMenu()">≡</button>
            <div class="header-title" id="mode-title">암송 카드 (연습)</div>
            <button onclick="handleLogout()" style="background:none; border:none; color:white; font-size:12px">로그아웃</button>
        </div>

        <div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>
        <div class="side-menu" id="sideMenu">
            <div class="menu-header" id="user-display">사용자님</div>
            <div class="menu-item" onclick="setMode('practice')">📖 암송 카드 (연습)</div>
            <div class="menu-item" onclick="setMode('test')">✍️ 암송 테스트 (시험)</div>
            <div style="padding: 20px 20px 5px; font-size: 12px; color: #999;">데이터 세트 선택</div>
            <select id="data-select" class="btn" onchange="loadData(this.value); toggleMenu();" style="width:85%; margin:0 20px; background:#f1f5f9"></select>
            <div id="part-container"></div>
        </div>

        <main class="main-content">
            <div class="card" id="main-card" onclick="handleCardClick()">
                <div id="v-id" style="color:var(--main-blue); font-weight:bold; font-size:14px; margin-bottom:5px">-</div>
                <div id="v-theme" class="theme">제목</div>
                <div id="v-ref" class="ref">장절</div>
                <div id="v-content" class="content">내용</div>
            </div>
            <div class="controls">
                <button class="btn" style="background:white; color:#333" onclick="prevVerse()">이전</button>
                <button class="btn primary-btn" onclick="handleNext()">다음</button>
            </div>
            <div id="v-page" style="margin-top:20px; opacity:0.8; font-size:14px;">0 / 0</div>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
