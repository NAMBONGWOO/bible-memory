<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성경암송 매니저</title>
    <style>
        /* (스타일은 이전과 동일하게 유지하되 메뉴 선택바 추가) */
        :root { --main-blue: #0284c7; --dark-blue: #1e40af; }
        body { background: linear-gradient(135deg, var(--main-blue) 0%, #075985 100%); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; min-height: 100vh; color: white; }
        .set-selector { margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 15px; }
        .card { background: white; width: 100%; max-width: 360px; border-radius: 20px; padding: 25px; text-align: center; color: #333; min-height: 250px; display: flex; flex-direction: column; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); cursor: pointer; }
        .content { display: none; background: #f3f4f6; padding: 15px; border-radius: 10px; margin-top: 15px; text-align: left; }
        .test-input { width: 100%; max-width: 360px; margin-top: 20px; height: 80px; border-radius: 10px; border: none; padding: 10px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn { padding: 10px 25px; border-radius: 10px; border: 1px solid white; background: transparent; color: white; cursor: pointer; }
        .part-menu { display: flex; flex-wrap: wrap; gap: 5px; margin: 15px 0; justify-content: center; }
        .part-btn { font-size: 12px; padding: 5px 10px; border-radius: 5px; border: 1px solid white; background: rgba(255,255,255,0.1); color: white; }
        .active { background: white; color: var(--main-blue); font-weight: bold; }
    </style>
</head>
<body>

    <div class="set-selector">
        <select id="data-select" onchange="loadData(this.value)" style="padding: 5px; border-radius: 5px;">
            <option value="nav_60.json">네비게이토 60구절</option>
            <option value="nav_180.json">네비게이토 180구절</option>
        </select>
    </div>

    <div class="part-menu" id="part-menu">
        <button class="part-btn active" onclick="filterPart('A')">A파트</button>
        <button class="part-btn" onclick="filterPart('B')">B파트</button>
        <button class="part-btn" onclick="filterPart('C')">C파트</button>
        <button class="part-btn" onclick="filterPart('D')">D파트</button>
        <button class="part-btn" onclick="filterPart('E')">E파트</button>
    </div>

    <div class="card" onclick="document.getElementById('v-content').style.display='block'">
        <div id="v-id" style="color:var(--main-blue); font-weight:bold;">A-1</div>
        <div id="v-theme" style="font-size:22px; margin:10px 0;">주제 로딩중...</div>
        <div id="v-ref" style="color:#666;">장절 로딩중...</div>
        <div id="v-content" class="content">본문 내용</div>
    </div>

    <textarea class="test-input" id="test-input" placeholder="암송을 입력해보세요..."></textarea>

    <div class="btn-group">
        <button class="btn" onclick="prev()">이전</button>
        <button class="btn" onclick="next()">다음</button>
    </div>

    <script>
        let allVerses = [];
        let currentVerses = [];
        let currentIndex = 0;

        // [핵심] 외부 JSON 파일을 읽어오는 함수
   
async function loadData(fileName) {
    try {
        // 경로 앞에 'data/'를 붙여서 폴더 안을 찾게 합니다.
        const response = await fetch(`./data/${fileName}`); 
        if (!response.ok) throw new Error('파일을 찾을 수 없습니다.');
        
        allVerses = await response.json();
        filterPart('A'); 
    } catch (error) {
        console.error("데이터 로딩 실패:", error);
        alert("데이터를 불러오지 못했습니다. 경로를 확인해주세요.");
    }
}

// 앱 시작 시 호출 부분
loadData('nav_60.json');
    </script>
</body>
</html>
