<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성경암송 매니저</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-screen" class="auth-overlay">
        <div id="login-card" class="auth-card">
            <h2 style="color:var(--main-blue); margin:0;">성경암송 매니저</h2>
            <input type="email" id="login-email" class="test-input" placeholder="이메일">
            <input type="password" id="login-pw" class="test-input" placeholder="비밀번호">
            <button class="btn primary-btn" onclick="handleLogin()">로그인</button>
            <p style="font-size:13px;">계정이 없으신가요? <a href="#" onclick="openSignupModal()" style="color:var(--main-blue); font-weight:bold;">회원가입</a></p>
        </div>

        <div id="signup-card" class="auth-card" style="display:none; max-height: 90vh; overflow-y: auto;">
            <h3 style="color:var(--main-blue); margin:0;">새 계정 만들기</h3>
            <div style="text-align:left; display:flex; flex-direction:column; gap:8px;">
                <input type="email" id="reg-email" class="test-input" placeholder="이메일">
                <input type="password" id="reg-pw" class="test-input" placeholder="비밀번호">
                <input type="password" id="reg-pw-confirm" class="test-input" placeholder="비밀번호 확인">
                <div id="pw-match-msg" class="check-msg"></div>
                <input type="text" id="reg-nickname" class="test-input" placeholder="닉네임 (2자 이상)">
                <div id="nick-match-msg" class="check-msg"></div>
                
                <div id="course-checkboxes" style="background:#f8fafc; padding:15px; border-radius:15px; font-size:12px; color:#333;">
                    <p style="margin:0 0 5px; font-weight:bold;">[코스 선택]</p>
                    <label><input type="checkbox" name="course" value="nav_60.json" checked> 주제별 60</label><br>
                    <label><input type="checkbox" name="course" value="series_180_s1.json"> 시리즈 1 (하나님)</label>
                    </div>
            </div>
            <button class="btn primary-btn" onclick="handleSignUpFinal()">가입 완료</button>
            <button class="btn" style="background:#eee; color:#333;" onclick="closeSignupModal()">취소</button>
        </div>
    </div>

    <div id="app-content" style="display:none; width:100%">
        <header class="top-bar">
            <button class="menu-btn" onclick="toggleMenu()" style="background:none; border:none; color:white; font-size:28px;">≡</button>
            <div id="mode-title" style="font-weight:bold;">암송 카드 (연습)</div>
            <button onclick="handleLogout()" style="background:none; border:none; color:white; font-size:12px;">로그아웃</button>
        </header>

        <div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>
        <div class="side-menu" id="sideMenu">
            <div id="user-display" style="font-weight:bold; font-size:18px; margin-bottom:20px;">사용자님</div>
            <div onclick="setMode('practice'); toggleMenu();">📖 암송 연습</div>
            <div onclick="setMode('test'); toggleMenu();" style="margin-top:15px;">✍️ 암송 테스트</div>
            <select id="data-select" class="test-input" onchange="loadData(this.value); toggleMenu();" style="margin-top:20px;"></select>
        </div>

        <main class="main-content">
            <div id="part-container"></div>
            <div class="card" id="main-card" onclick="handleCardClick()">
                <div id="v-id" style="color:var(--main-blue); font-weight:bold;">-</div>
                <div id="v-theme" style="font-size:20px; font-weight:bold;">제목</div>
                <div id="v-ref" style="font-size:16px; color:#666;">장절</div>
                <div id="v-content" style="font-size:18px; line-height:1.6;">내용</div>
            </div>
            <div class="controls" style="display:flex; gap:12px; width:90%; max-width:400px;">
                <button class="btn" style="background:white; color:#333; border:1px solid #ddd;" onclick="prevVerse()">이전</button>
                <button class="btn primary-btn" onclick="handleNext()">다음</button>
            </div>
        </main>
    </div>

    <script type="module" src="auth.js"></script>
    <script type="module" src="app.js"></script>
    <script src="practice.js"></script>
    <script src="test.js"></script>
</body>
</html>
