<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성경암송 매니저 Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-screen" class="modal-overlay">
        <div class="auth-card" id="login-card">
            <h2 style="color:var(--main-blue);">성경암송 매니저</h2>
            <input type="email" id="login-email" class="test-input" placeholder="이메일">
            <input type="password" id="login-pw" class="test-input" placeholder="비밀번호">
            <button class="btn primary-btn" style="width:100%;" onclick="handleLogin()">로그인</button>
            <p style="font-size:13px; margin-top:20px;">계정이 없으신가요? <a href="#" onclick="openSignupModal()">회원가입</a></p>
        </div>
        <div class="auth-card" id="signup-card" style="display:none;">
            <h3>회원가입</h3>
            <div style="text-align:left; font-size:12px;">
                <label>이메일</label><input type="email" id="reg-email" class="test-input">
                <label>비밀번호</label>
                <div class="pw-group"><input type="password" id="reg-pw" class="test-input"><span class="pw-toggle" onclick="togglePw('reg-pw')">👁️</span></div>
                <label>비밀번호 확인</label>
                <div class="pw-group"><input type="password" id="reg-pw-confirm" class="test-input"><span class="pw-toggle" onclick="togglePw('reg-pw-confirm')">👁️</span></div>
                <label>닉네임</label><input type="text" id="reg-nickname" class="test-input">
                <label style="font-weight:bold; margin:10px 0 5px; display:block;">코스 선택</label>
                <div id="course-checkboxes" style="border:1px solid #eee; padding:10px; border-radius:10px;">
                    <div><input type="checkbox" name="course" value="nav_60.json" checked> 주제별 60구절</div>
                    <div><input type="checkbox" name="course" value="basic_100.json"> 기초 과정</div>
                    <div><input type="checkbox" name="course" value="deep_180.json"> 심화 180구절</div>
                    <div><input type="checkbox" name="course" value="dep_242.json"> DEP 242구절</div>
                </div>
            </div>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button class="btn" onclick="closeSignupModal()">취소</button>
                <button class="btn primary-btn" onclick="handleSignUpFinal()">가입완료</button>
            </div>
        </div>
    </div>

    <div id="app-content" style="display:none;">
        <div class="top-bar">
            <div style="display:flex; align-items:center;">
                <div class="hamburger" onclick="toggleSidebar()">☰</div>
                <span id="user-display" style="margin-left:10px; font-weight:bold;"></span>
            </div>
            <button onclick="handleLogout()" style="background:none; border:none; color:white;">로그아웃</button>
        </div>

        <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">메뉴</div>
            <ul class="menu-list">
                <li onclick="alert('준비 중입니다')">📖 암송 연습</li>
                <li onclick="alert('준비 중입니다')">✍️ 암송 테스트</li>
            </ul>
            <label style="font-size:12px; font-weight:bold;">데이터 세트</label>
            <select id="data-selector" class="test-input" onchange="loadData(this.value); toggleSidebar();" style="margin-top:5px;"></select>
            <div id="part-container" class="part-menu"></div>
        </nav>

        <main class="main-view">
            <div class="card" onclick="handleCardClick()">
                <div id="v-id" style="color:var(--main-blue); font-weight:bold;">-</div>
                <div id="v-theme" class="theme">제목</div>
                <div id="v-ref" class="ref">장절</div>
                <div id="v-content" class="content">내용</div>
            </div>
            <div class="controls">
                <button class="btn" onclick="prevVerse()">이전</button>
                <button class="btn primary-btn" onclick="handleNext()">다음</button>
            </div>
            <div id="v-page" class="footer">0 / 0</div>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
